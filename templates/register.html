<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register – MediTrack AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="logo-circle">💊</div>
      <h1>Create Account</h1>
      <p>Start managing your health today</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.register') }}">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" name="name" class="form-control"
          placeholder="Jane Doe"
          value="{{ name if name is defined else '' }}"
          required autofocus />
      </div>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control"
          placeholder="jane@example.com"
          value="{{ email if email is defined else '' }}"
          required />
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" id="pw"
          class="form-control" placeholder="At least 8 characters" required />
      </div>

      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" name="confirm_password" id="pw2"
          class="form-control" placeholder="Repeat password" required />
        <p id="pwMatch" style="font-size:0.78rem; margin-top:4px; display:none;"></p>
      </div>

      <button type="submit" class="btn btn-primary btn-lg w-100 mt-2">
        🚀 Create Account
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a>
    </div>

  </div>
</div>

<script>
  // Live password match feedback
  const pw  = document.getElementById('pw');
  const pw2 = document.getElementById('pw2');
  const msg = document.getElementById('pwMatch');

  pw2.addEventListener('input', () => {
    if (pw2.value.length === 0) { msg.style.display = 'none'; return; }
    msg.style.display = 'block';
    if (pw.value === pw2.value) {
      msg.textContent = '✅ Passwords match';
      msg.style.color = '#15803d';
    } else {
      msg.textContent = '❌ Passwords do not match';
      msg.style.color = '#b91c1c';
    }
  });
</script>
</body>
</html>
